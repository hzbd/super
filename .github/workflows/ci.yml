name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  HUGO_VERSION: '0.163.3'

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: swatinem/rust-cache@v2

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace

  docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: ${{ env.HUGO_VERSION }}
          extended: true

      - name: Build docs
        working-directory: ./docs
        env:
          HUGO_BASEURL: https://super.docs.sconts.com/
        run: hugo --minify --printPathWarnings

      - name: Smoke-check published pages
        working-directory: ./docs
        run: |
          set -euo pipefail
          test -f public/index.html
          test -f public/docs/index.html
          test -f public/docs/01-getting-started/index.html
          test -f public/docs/02-essentials/configuration/index.html
          test -f public/docs/07-editions/feature-matrix/index.html
          # Fail CI if stale commercial hostname leaks into the built site
          if grep -RIn 'super\.project\.sconts\.com' public; then
            echo '::error::Built docs still reference super.project.sconts.com'
            exit 1
          fi
