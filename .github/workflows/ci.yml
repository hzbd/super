name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  HUGO_VERSION: '0.163.3'

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch verifying keys from Manager
        env:
          MANAGER_BASE: ${{ secrets.MANAGER_BASE }}
          MANAGER_TOKEN: ${{ secrets.MANAGER_TOKEN }}
          REQUIRE_MANAGER_KEYRING: '1'
        run: bash .github/scripts/fetch-verifying-keys.sh

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: swatinem/rust-cache@v2

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace

  docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: ${{ env.HUGO_VERSION }}
          extended: true

      - name: Build docs
        working-directory: ./docs
        env:
          HUGO_BASEURL: https://super.docs.sconts.com/
        run: hugo --minify --printPathWarnings

      - name: Smoke-check published pages
        working-directory: ./docs
        run: |
          set -euo pipefail
          test -f public/index.html
          test -f public/docs/index.html
          test -f public/docs/01-getting-started/index.html
          test -f public/docs/02-essentials/configuration/index.html
          test -f public/docs/07-editions/feature-matrix/index.html
          # Fail CI if stale commercial hostname leaks into the built site
          if grep -RIn 'super\.project\.sconts\.com' public; then
            echo '::error::Built docs still reference super.project.sconts.com'
            exit 1
          fi

      - name: Rebuild with site-relative baseURL for link check
        working-directory: ./docs
        env:
          # Absolute production URLs cannot be resolved offline; rebuild once for local crawl.
          HUGO_BASEURL: /
        run: |
          rm -rf public
          hugo --minify

      - name: Check internal HTML links (offline)
        uses: lycheeverse/lychee-action@v2
        with:
          # Prefer --root-dir (site root for absolute /… links). Do not use --base /
          # --base-url here: relative hrefs would resolve against the site root and
          # false-positive as 404s (lychee ≥0.24).
          args: >-
            --offline
            --no-progress
            --root-dir ${{ github.workspace }}/docs/public
            --exclude-path ${{ github.workspace }}/docs/public/js
            --exclude-path ${{ github.workspace }}/docs/public/css
            'docs/public/**/*.html'
          fail: true
